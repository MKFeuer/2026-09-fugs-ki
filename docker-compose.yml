services:
  tools:
    build: ./tools
    container_name: tools
    ports:
      - "3002:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  commandx:
    build: ./commandx
    container_name: commandx
    ports:
      - "3003:8000"
    env_file:
      - ./commandx/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # agentv2 - New version with MCP support
  agentv2:
    build: ./agentv2
    ports:
      - "3000:3001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MCP_TOOLS_URL: http://tools:8000
      MCP_COMMANDX_URL: http://commandx:8000
    volumes:
      - agentv2-data:/app/data
    depends_on:
      tools:
        condition: service_healthy
      commandx:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  agentv2-data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/28
